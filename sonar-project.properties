# SonarQube/SonarCloud configuration for bulletin-fetcher
# See https://docs.sonarqube.org/latest/analysis/analysis-parameters/

# Project identification
sonar.projectKey=bulletin-fetcher
sonar.projectName=bulletin-fetcher
sonar.projectVersion=0.1.0

# Source code location
sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/__pycache__/**,**/*.egg-info/**

# Python-specific settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Additional quality gates
sonar.qualitygate.wait=true
